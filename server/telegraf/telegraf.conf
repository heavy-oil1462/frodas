# frodas telegraf: MQTT -> VictoriaMetrics (InfluxDB line protocol).
#
# Topic shape (docs/PROTOCOL.md):
#   frodas/<node>/<component>/<object_id>/state   e.g. .../sensor/battery_voltage/state
#   frodas/<node>/status                          online/offline (LWT)
#
# Resulting VictoriaMetrics metrics: <object_id>_value{node="<node>"}
# e.g. battery_voltage_value, soil_moisture_value, irrigation_valve_value,
#      status_value (1 = radio window open).

[agent]
  interval = "10s"
  flush_interval = "10s"
  omit_hostname = true

[[outputs.influxdb]]
  urls = ["http://victoriametrics:8428"]
  database = "frodas"
  skip_database_creation = true

# --- numeric states: sensors and setpoint numbers -----------------------------
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  username = "${MQTT_USER}"
  password = "${MQTT_PASSWORD}"
  client_id = "telegraf-frodas-num"
  qos = 1
  persistent_session = true
  topics = [
    "frodas/+/sensor/+/state",
    "frodas/+/number/+/state",
  ]
  data_format = "value"
  data_type = "float"
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "frodas/+/+/+/state"
    measurement = "_/_/_/measurement/_"
    tags = "_/node/component/_/_"

# --- ON/OFF and open/closed states: switches, binary sensors, covers ----------
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  username = "${MQTT_USER}"
  password = "${MQTT_PASSWORD}"
  client_id = "telegraf-frodas-bool"
  qos = 1
  persistent_session = true
  topics = [
    "frodas/+/switch/+/state",
    "frodas/+/binary_sensor/+/state",
    "frodas/+/cover/+/state",
  ]
  data_format = "value"
  data_type = "string"
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "frodas/+/+/+/state"
    measurement = "_/_/_/measurement/_"
    tags = "_/node/component/_/_"

# --- availability (LWT/birth): online means "radio window open" ---------------
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  username = "${MQTT_USER}"
  password = "${MQTT_PASSWORD}"
  client_id = "telegraf-frodas-status"
  qos = 1
  persistent_session = true
  topics = ["frodas/+/status"]
  data_format = "value"
  data_type = "string"
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "frodas/+/+"
    measurement = "_/_/measurement"
    tags = "_/node/_"

# Map textual states to numbers so Grafana can plot them.
[[processors.enum]]
  [[processors.enum.mapping]]
    field = "value"
    [processors.enum.mapping.value_mappings]
      ON = 1
      OFF = 0
      online = 1
      offline = 0
      open = 1
      opening = 1
      closing = 1
      closed = 0
