# frodas mosquitto configuration
# Auth required (no anonymous), persistence on so retained setpoints and
# telemetry survive broker restarts — retained messages ARE the device<->HA
# handoff while the greenhouse radio sleeps (docs/PROTOCOL.md).

listener 1883
protocol mqtt

allow_anonymous false
password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/
autosave_interval 300

max_queued_messages 1000

log_dest stdout
log_type error
log_type warning
log_type notice
