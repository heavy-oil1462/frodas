name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - name: validation gate
        run: nix develop -c python3 tools/validate.py
      - name: protocol integration test
        run: nix develop -c python3 tools/test_protocol.py

  firmware-build:
    # Full C++ firmware build — slow (toolchain download), so only on main
    # pushes and when firmware sources change on PRs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: cache platformio
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('esphome/greenhouse-base.yaml') }}
      - name: compile firmware
        run: |
          pip install esphome
          cp esphome/secrets.yaml.example esphome/secrets.yaml
          esphome compile esphome/example-greenhouse.yaml
      - name: compile sim firmware (QEMU target)
        run: esphome compile esphome/sim-greenhouse.yaml
        # The full rule-level test (tools/test_sim.py) stays a local tool for
        # now: it needs Espressif QEMU (a ~20 min source build without a
        # populated nix cache) and udp/123. See docs/SIMULATION.md.
